spring.application.name=muua-gallery-api
spring.profiles.active=dev

# DataSource Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/muua_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Batch inserts: agrupa N INSERTs en una sola llamada JDBC → mucho más rápido para importar Excel
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# File upload limits
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
server.tomcat.max-http-form-post-size=-1

# Logging
logging.level.root=INFO
logging.level.com.muua.gallery=DEBUG
logging.level.org.springframework.web=DEBUG

# Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.main.allow-circular-references=true


# Cloudinary
# Spring Batch - no ejecutar job automaticamente al iniciar
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

cloudinary.cloud-name=
cloudinary.api-key=
cloudinary.api-secret=

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
# Directorio temporal donde se guarda el Excel antes de procesarlo
batch.temp-dir=${java.io.tmpdir}/muua-uploads

# Número de workers paralelos para subir imágenes a Cloudinary (fase 2)
batch.partitioner.grid-size=4