version: "3.8"

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:15-alpine
    container_name: muua_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-muua_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      # Volumen para persistencia de datos
      - postgres_data:/var/lib/postgresql/data
      # Cargar script SQL al iniciar
      - ./frontend/DATABASE_SETUP.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - muua_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5432"

  # Spring Boot Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: muua_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-muua_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SERVER_PORT: 8080
      JAVA_OPTS: -Xmx512m -Xms256m
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - muua_network
    expose:
      - "8080"
    restart: unless-stopped

  # React Frontend Service (Production)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8080/api
    container_name: muua_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - muua_network
    restart: unless-stopped

  # Nginx Reverse Proxy (Opcional - comentado)
  # nginx:
  #   image: nginx:alpine
  #   container_name: muua_nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - frontend
  #     - backend
  #   networks:
  #     - muua_network
  #   restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  muua_network:
    driver: bridge
